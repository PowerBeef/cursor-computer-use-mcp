name: Bug report
description: Report a problem with cairn / cairn MCP.
title: "[bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Please run `cairn doctor --cursor` and paste the output below. Most issues are caused by missing Accessibility / Screen Recording permissions on **Cairn.app** (not Terminal/Cursor).
  - type: input
    id: cursor-version
    attributes:
      label: Cursor version
      placeholder: "e.g. 1.2.3"
    validations:
      required: true
  - type: input
    id: macos-version
    attributes:
      label: macOS version
      placeholder: "e.g. macOS 26.0 (Tahoe)"
    validations:
      required: true
  - type: input
    id: cairn-version
    attributes:
      label: cairn version
      description: Output of `cairn --version`.
      placeholder: "e.g. 0.1.51"
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: cairn doctor --cursor output
      render: text
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `list_apps`
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual behaviour
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Optional; redact anything sensitive.
